name: Deploy Cloud Storage

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Login to Azure
        run: |
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Create Container if not exists
        run: |
          az storage container create \
            --connection-string "${{ secrets.AZURE_STORAGE_KEY }}" \
            --name files \
            --public-access blob

      - name: Upload test file
        run: |
          echo "Deployed on $(date)" > deployment-test.txt
          az storage blob upload \
            --connection-string "${{ secrets.AZURE_STORAGE_KEY }}" \
            --container-name files \
            --file deployment-test.txt \
            --name deployment-test.txt \
            --overwrite

      - name: Verify deployment
        run: |
          echo "✅ Storage deployed successfully!"
          echo "🌐 URL: https://mitailive.blob.core.windows.net/files/deployment-test.txt"